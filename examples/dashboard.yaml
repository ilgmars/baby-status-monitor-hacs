# Example Lovelace dashboard for the Baby Status Monitor.
#
# Replace before use:
#   - VIEWER_USER / VIEWER_PASSWORD: the go2rtc viewer credentials from your server
#   - SERVER_HOST: your baby-status-monitor host (e.g. 192.168.1.10)
#   - entity ids: HA derives them from your device/integration name; check yours under
#     Settings -> Devices & Services. The ids below assume the integration is named
#     "Baby Monitor".
#
# The camera card is https://github.com/dermotduffy/advanced-camera-card (HACS).
# Entities marked [ML] come from the local detectors, [LLM] from scene narration
# (SCENE_LLM=on on the server).
views:
  - type: sections
    max_columns: 1
    sections:
      - cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.baby_monitor_live
                live_provider: go2rtc
                go2rtc:
                  url: >-
                    https://VIEWER_USER:VIEWER_PASSWORD@SERVER_HOST/live
                  stream: cam
                  modes:
                    - mse
                    - webrtc
            layout: responsive
            tap_action:
              action: more-info
            live:
              preload: true
              auto_unmute:
                - selected
              auto_mute: []
          - type: vertical-stack
            cards:
              - type: heading
                heading: Safety
                heading_style: subtitle
                icon: mdi:shield-alert-outline
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: tile
                    entity: binary_sensor.baby_monitor_danger
                    name: Danger
                    icon: mdi:alert-octagon-outline
                    color: red
                  - type: tile
                    entity: binary_sensor.baby_monitor_warning
                    name: Warning
                    icon: mdi:alert-outline
                    color: amber
              - type: tile
                entity: sensor.baby_monitor_attention_reason
                name: Reason
                icon: mdi:message-text-outline
                color: grey
              - type: heading
                heading: Baby
                heading_style: subtitle
                icon: mdi:baby-face-outline
              - type: grid
                columns: 3
                square: false
                cards:
                  - type: tile
                    entity: binary_sensor.baby_monitor_baby_present
                    name: Presence
                    icon: mdi:home-heart
                    color: green
                  - type: tile
                    entity: binary_sensor.baby_monitor_baby_visible
                    name: Visibility
                    icon: mdi:eye-outline
                    color: green
                  - type: tile
                    entity: sensor.baby_monitor_baby_position
                    name: Position
                    icon: mdi:human-child
                    color: green
                  - type: tile
                    entity: binary_sensor.baby_monitor_breathing_detected
                    name: Breathing
                    icon: mdi:lungs
                    color: green
                  - type: tile
                    entity: sensor.baby_monitor_respiration_rate
                    name: Rate
                    icon: mdi:pulse
                    color: blue
                  - type: tile
                    entity: binary_sensor.baby_monitor_breathing_detection_degraded
                    name: Sensor
                    icon: mdi:wrench-clock
                    color: grey
                  - type: tile
                    entity: binary_sensor.baby_monitor_crying
                    name: Crying
                    icon: mdi:emoticon-cry-outline
                    color: amber
                  - type: tile
                    entity: sensor.baby_monitor_cry_reason
                    name: Cry reason
                    icon: mdi:message-text-outline
                    color: grey
                  - type: tile
                    entity: binary_sensor.baby_monitor_movement
                    name: Movement
                    icon: mdi:run
                    color: blue
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: tile
                    entity: sensor.baby_monitor_sleep_state
                    name: Sleep
                    icon: mdi:sleep
                    color: blue
                  - type: tile
                    entity: sensor.baby_monitor_latest_status
                    name: Latest
                    icon: mdi:cctv
                    color: grey
              - type: heading
                heading: System
                heading_style: subtitle
                icon: mdi:server-network
              - type: grid
                columns: 3
                square: false
                cards:
                  - type: tile
                    entity: binary_sensor.baby_monitor_camera_online
                    name: Camera
                    icon: mdi:cctv
                    color: grey
                  - type: tile
                    entity: sensor.baby_monitor_sys_audio_health
                    name: Audio
                    icon: mdi:microphone-outline
                    color: grey
                  - type: tile
                    entity: sensor.baby_monitor_sys_llm_health
                    name: LLM
                    icon: mdi:robot-outline
                    color: grey
              # Objects seen in the crib - simple text list, no resource needed.
              # Check your entity id under Developer Tools -> States (it may be
              # sensor.baby_monitor_crib_items_llm depending on the integration name).
              - type: markdown
                content: >
                  {% set items = state_attr('sensor.baby_monitor_crib_items_llm',
                  'items') or [] %}

                  ### Crib cam - objects

                  {% if items %}
                  {% for it in items %}
                  {% if it.hazard %}**{{ it.item | upper }} - HAZARD**{% else %}{{
                  it.item }}{% endif %}
                  {% endfor %}
                  {% else %}
                  `- no objects in the crib -`
                  {% endif %}
              # Prefer the CCTV grid? Register www/crib-items-card.js as a resource
              # (see README) and swap the markdown card above for this one:
              # - type: custom:crib-items-card
              #   entity: sensor.baby_monitor_crib_items_llm
              #   title: Crib camera - objects
              #   columns: 3
              #   min_tiles: 6
